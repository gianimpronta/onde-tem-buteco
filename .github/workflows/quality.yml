name: Code quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Python: linting + formatação via Ruff ─────────────────────────────────
  ruff:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Run ruff check
        run: |
          pip install "ruff==0.11.6" --quiet
          ruff check scraper/
          ruff format --check scraper/

  # ── TypeScript: formatação via Prettier ───────────────────────────────────
  prettier:
    name: Format TypeScript (prettier)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run prettier check
        working-directory: apps/web
        run: npx prettier --check "app/**/*.{ts,tsx}" "lib/**/*.{ts,tsx}"

  # ── Python: cobertura de testes ───────────────────────────────────────────
  coverage-python:
    name: Test coverage (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt "pytest==8.3.5" "pytest-cov==6.1.0" --quiet

      - name: Run tests with coverage
        run: |
          pytest scraper/tests/ \
            --cov=scraper \
            --cov-report=xml:scraper/coverage.xml \
            --cov-config=scraper/.coveragerc \
            -v

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-python
          path: scraper/coverage.xml

  # ── TypeScript: cobertura de testes ──────────────────────────────────────
  coverage-typescript:
    name: Test coverage (TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run tests with coverage
        working-directory: apps/web
        run: pnpm test --coverage

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-typescript
          path: apps/web/coverage/lcov.info

  # ── SonarCloud: qualidade agregada (dívida técnica, duplicação, cobertura) ─
  sonarcloud:
    name: Quality gate (SonarCloud)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [coverage-python, coverage-typescript]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # histórico completo para blame e new-code detection

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage-python
          path: scraper/

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage-typescript
          path: apps/web/coverage/

      - uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8 # v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

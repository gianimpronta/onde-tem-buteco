name: Code quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Python: linting + formatação via Ruff ─────────────────────────────────
  ruff:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Run ruff fix
        run: |
          pip install "ruff==0.11.6" --quiet
          ruff check --fix scraper/
          ruff format scraper/
          git diff --exit-code

  # ── TypeScript: formatação via Prettier ───────────────────────────────────
  prettier:
    name: Format TypeScript (prettier)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run prettier fix
        working-directory: apps/web
        run: |
          npx prettier --write "app/**/*.{ts,tsx}" "lib/**/*.{ts,tsx}"
          git diff --exit-code

  # ── Python: cobertura de testes ───────────────────────────────────────────
  coverage-python:
    name: Test coverage (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt -r scraper/requirements-dev.txt --quiet

      - name: Run tests with coverage
        run: |
          pytest scraper/tests/ \
            --cov=scraper \
            --cov-report=xml:scraper/coverage.xml \
            --cov-config=scraper/.coveragerc \
            -v

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-python
          path: scraper/coverage.xml

  # ── TypeScript: cobertura de testes ──────────────────────────────────────
  coverage-typescript:
    name: Test coverage (TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run tests with coverage
        working-directory: apps/web
        run: pnpm test --coverage

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-typescript
          path: apps/web/coverage/lcov.info

  # ── SonarCloud: qualidade agregada (dívida técnica, duplicação, cobertura) ─
  sonarcloud:
    name: Quality gate (SonarCloud)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [coverage-python, coverage-typescript]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # histórico completo para blame e new-code detection

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage-python
          path: scraper/

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage-typescript
          path: apps/web/coverage/

      - uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8 # v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

name: Test bypass methods

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências de teste
        run: |
          pip install curl-cffi==0.15.0 playwright playwright-stealth
          python -m playwright install chromium --with-deps

      - name: Testar métodos de bypass
        run: python scraper/test_bypass.py

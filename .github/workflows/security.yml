name: Security scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * 2" # terça-feira 07h UTC

permissions:
  contents: read
  security-events: write

jobs:
  # ── Secrets: credenciais vazadas no histórico git ─────────────────────────
  gitleaks:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Python SAST: vulnerabilidades comuns no código do scraper ─────────────
  bandit:
    name: SAST Python (bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Run bandit
        run: |
          pip install "bandit[toml]==1.8.3" "bandit-sarif-formatter==1.1.1" --quiet
          bandit -r scraper/ \
            --format sarif \
            --output bandit-results.sarif \
            --severity-level medium \
            || true

      - uses: github/codeql-action/upload-sarif@3b1a19a80ab047f35cbb237b5bd9bdc1e14f166c # v3
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  # ── TypeScript SAST: padrões inseguros no app Next.js ────────────────────
  eslint-security:
    name: SAST TypeScript (eslint-plugin-security)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run ESLint security scan
        working-directory: apps/web
        run: npm run lint

  # ── Python: vulnerabilidades em dependências do scraper ───────────────────
  pip-audit:
    name: Dependency audit (pip)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: scraper/requirements.txt

  # ── Node.js: vulnerabilidades em dependências do app web ──────────────────
  # pnpm audit usa endpoints do npm que foram aposentados (410 Gone).
  # Substituído por osv-scanner que consulta o banco OSV do Google diretamente.
  npm-audit:
    name: Dependency audit (npm)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
        with:
          scan-args: |-
            --lockfile=apps/web/pnpm-lock.yaml
            --verbosity=error

  # ── Docker: vulnerabilidades na imagem do FlareSolverr ────────────────────
  trivy:
    name: Container scan (trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ghcr.io/flaresolverr/flaresolverr:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - uses: github/codeql-action/upload-sarif@3b1a19a80ab047f35cbb237b5bd9bdc1e14f166c # v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-flaresolverr

  # ── Workflows: lint e segurança dos arquivos de CI ────────────────────────
  actionlint:
    name: Workflow lint (actionlint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: reviewdog/action-actionlint@e0207a28405ecad11953ba625a95d92f7889572a # v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-check

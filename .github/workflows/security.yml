name: Security scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * 2" # terça-feira 07h UTC

permissions:
  contents: read
  security-events: write

jobs:
  # ── Secrets: credenciais vazadas no histórico git ─────────────────────────
  gitleaks:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Python SAST: vulnerabilidades comuns no código do scraper ─────────────
  bandit:
    name: SAST Python (bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Run bandit
        run: |
          pip install "bandit[toml]==1.8.3" "bandit-sarif-formatter==1.1.1" --quiet
          bandit -r scraper/ \
            --format sarif \
            --output bandit-results.sarif \
            --severity-level medium \
            || true

      - uses: github/codeql-action/upload-sarif@0b7b740d4cd9b44f80c907b666497564df09d1d9 # v3
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  # ── TypeScript SAST: padrões inseguros no app Next.js ────────────────────
  eslint-security:
    name: SAST TypeScript (eslint-plugin-security)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run ESLint security scan
        working-directory: apps/web
        run: npm run lint

  # ── Python: vulnerabilidades em dependências do scraper ───────────────────
  pip-audit:
    name: Dependency audit (pip)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: scraper/requirements.txt

  # ── Node.js: vulnerabilidades em dependências do app web ──────────────────
  # pnpm audit usa endpoints do npm que foram aposentados (410 Gone).
  # Substituído por osv-scanner que consulta o banco OSV do Google diretamente.
  npm-audit:
    name: Dependency audit (npm)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
        with:
          scan-args: |-
            --lockfile=apps/web/pnpm-lock.yaml
            --verbosity=error

  # ── Docker: vulnerabilidades na imagem do FlareSolverr ────────────────────
  trivy:
    name: Container scan (trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ghcr.io/flaresolverr/flaresolverr:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - uses: github/codeql-action/upload-sarif@0b7b740d4cd9b44f80c907b666497564df09d1d9 # v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-flaresolverr

  # ── Workflows: lint e segurança dos arquivos de CI ────────────────────────
  actionlint:
    name: Workflow lint (actionlint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-check

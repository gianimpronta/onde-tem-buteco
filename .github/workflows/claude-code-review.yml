name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@06e80808089d6f52f03cf401bc7ac4f03528b3c5 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}

            Diretrizes adicionais do projeto Onde Tem Buteco:
            - TypeScript strict mode — sem `any`
            - Server Components por padrão; `"use client"` só quando necessário
            - Nunca usar `prisma.$queryRaw` — usar apenas a API do Prisma
            - Sem CSS customizado fora do Tailwind
            - Sem commitar secrets ou credenciais
            - Nunca expor o Prisma client no browser
            - Python: respeitar rate limit com `time.sleep`, sem scraping agressivo

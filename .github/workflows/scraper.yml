name: Scraper semanal

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

# Mínimo de permissões para o GITHUB_TOKEN — o scraper não precisa escrever no repo
permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    # Ambiente protegido: exige aprovação manual no GitHub antes de executar via
    # workflow_dispatch. Crie o ambiente "scraper" em:
    # Settings → Environments → New environment → Required reviewers
    environment: scraper

    steps:
      # Ações pinadas ao SHA do commit (não à tag mutável) para evitar
      # supply-chain attacks caso uma tag seja movida maliciosamente.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout v4

      - name: Iniciar FlareSolverr
        run: |
          docker run -d --name flaresolverr \
            -p 127.0.0.1:8191:8191 \
            -e LOG_LEVEL=warning \
            ghcr.io/flaresolverr/flaresolverr:latest

          echo "Aguardando FlareSolverr..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8191/ | grep -q "FlareSolverr"; then
              echo "FlareSolverr pronto (tentativa $i)."
              break
            fi
            sleep 2
          done

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # actions/setup-python v6.2.0
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r scraper/requirements.txt

      # O secret nunca é impresso — passado apenas como variável de ambiente
      # do processo filho, não aparece em logs nem em env do runner principal
      - name: Rodar scraper
        env:
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
        run: python scraper/main.py

version: 2

updates:
  # Dependências do app Next.js
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      # Agrupa patches e minors em um único PR para reduzir ruído
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Dependências do scraper Python
  - package-ecosystem: pip
    directory: /scraper
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  # Actions do GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

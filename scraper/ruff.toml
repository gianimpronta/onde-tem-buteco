line-length = 100
exclude = ["test_bypass.py"]

[lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "B",   # flake8-bugbear — bugs e design problems
  "UP",  # pyupgrade — modernização de sintaxe
]

[format]
quote-style = "double"
indent-style = "space"

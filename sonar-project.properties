sonar.projectKey=gianimpronta_onde-tem-buteco
sonar.organization=gianimpronta

sonar.projectName=Onde Tem Buteco
sonar.projectVersion=1.0

# Fontes analisadas
sonar.sources=apps/web/app,apps/web/lib,scraper

# Testes
sonar.tests=scraper/tests,apps/web/lib/__tests__,apps/web/app/api/butecos/__tests__

# Exclusões — gerados, deps, cache, scripts diagnósticos
sonar.exclusions=**/node_modules/**,**/.next/**,**/generated/**,**/__pycache__/**,**/migrations/**,scraper/test_bypass.py,scraper/tests/**,apps/web/lib/__tests__/**,apps/web/app/**/__tests__/**

# TypeScript
sonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info
sonar.coverage.exclusions=apps/web/app/**/page.tsx,apps/web/app/layout.tsx,apps/web/lib/auth.ts,apps/web/lib/prisma.ts,apps/web/app/api/auth/[...nextauth]/route.ts

# Python
sonar.python.version=3.12
sonar.python.coverage.reportPaths=scraper/coverage.xml
